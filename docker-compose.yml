services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: file:/app/data/dev.db
      JWT_SECRET: taskflow-dev-secret-change-in-production
      PORT: "3001"
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
